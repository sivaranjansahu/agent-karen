services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmpass
      POSTGRES_DB: mattermost
    volumes:
      - mm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 5s
      timeout: 3s
      retries: 5

  mattermost:
    image: mattermost/mattermost-team-edition:10.5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:mmpass@postgres:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: "true"
      MM_SERVICESETTINGS_ENABLEOAUTHSERVICEPROVIDER: "true"
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "true"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
    ports:
      - "8065:8065"
    volumes:
      - mm-data:/mattermost/data
      - mm-config:/mattermost/config
      - mm-logs:/mattermost/logs
      - mm-plugins:/mattermost/plugins

volumes:
  mm-pgdata:
  mm-data:
  mm-config:
  mm-logs:
  mm-plugins:
